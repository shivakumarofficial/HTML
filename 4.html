<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

        }
        .red{
            background-color: red;
           
        }
        .white{
            background-color: white;
            
        }
        .green{
            background-color: green;
            width: 300px;
            height: 50px;
        }
        .dim{
            width: 300px;
            height: 50px;
        }
        .chakra{
            width: 50px;
            height: 50px;
            margin-left: 120px;
        }
    </style>
</head>
<body>
    <div class="red dim"></div>
    <div class="white dim">
        <img class="chakra" src="ashokachakra.png" alt="">
    </div>
    <div class="green dim"></div><br>
    <button id="button1">Play Anthem</button>
    <audio id="audio1" src="National-Anthem-India.mp3"></audio>
    <script>
        let btn1=document.getElementById("button1");
        btn1.onclick=function playAudio(){
            let aud1=document.getElementById("audio1");
            aud1.play();
        }
    </script>
</body>
</html>
